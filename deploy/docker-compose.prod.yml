name: career

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: app
    env_file:
      - ./.env
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    networks:
      - appnet

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: nginx
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - appnet

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  app-storage:
  app-cache:
